apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-kube-prometheus-stack-alertmanager
  namespace: monitoring
stringData:
  alertmanager.yaml: |
    global:
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'srivprak0106@gmail.com'
      smtp_auth_username: 'srivprak0106@gmail.com'
      smtp_auth_password_file: /etc/alertmanager/secrets/alertmanager-email-creds/password
      smtp_require_tls: true
    route:
      receiver: 'email'
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
    - name: 'email'
      email_configs:
      - to: 'srivprak0106@gmail.com'
        send_resolved: true
        subject: 'SkillPulse Alert: {{ .CommonLabels.alertname }}'
        body: |
          Alert: {{ .CommonLabels.alertname }}
          Namespace: {{ .CommonLabels.namespace }}
          Description: {{ .CommonAnnotations.description }}
